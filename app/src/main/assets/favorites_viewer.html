<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link rel="stylesheet" href="katex/katex.min.css">
<script src="katex/katex.min.js"></script>
<script src="katex/auto-render.min.js"></script>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --card: #1e1e32;
  --card-hover: #262640;
  --stroke: rgba(255,255,255,0.06);
  --accent: #e94560;
  --accent-2: #7c4dff;
  --blue: #4fc3f7;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #ef4444;
  --text: #f0f0f5;
  --text-2: #a0a0b8;
  --text-3: #6b6b85;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-bounce: cubic-bezier(.34,1.56,.64,1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); }
body {
  font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::-webkit-scrollbar { display:none; }

/* ===== 全局滚动 ===== */
#app { position:relative; min-height:100vh; }
.page {
  position:relative;
  animation:pageIn .35s var(--ease) both;
}
@keyframes pageIn {
  from { opacity:0; transform:translateX(30px); }
  to { opacity:1; transform:translateX(0); }
}

/* ===== 顶栏 ===== */
.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(15,15,26,0.88);
  backdrop-filter:blur(24px) saturate(1.3);
  -webkit-backdrop-filter:blur(24px) saturate(1.3);
  border-bottom:1px solid var(--stroke);
  padding:12px 16px;
  display:flex; align-items:center; gap:10px;
}
.topbar-back {
  width:38px; height:38px; border-radius:12px; border:1px solid var(--stroke);
  background:var(--card); color:var(--accent); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all .15s var(--ease);
}
.topbar-back:active { background:var(--card-hover); transform:scale(0.9); }
.topbar-home { width:38px; height:38px; border-radius:12px; border:1px solid var(--stroke); background:var(--card); color:var(--text-3); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all .15s var(--ease); }
.topbar-home:active { background:var(--card-hover); transform:scale(0.9); }
.topbar-title { flex:1; min-width:0; }
.topbar-title h1 { font-size:17px; font-weight:700; color:var(--text); line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-title .sub { font-size:12px; color:var(--text-3); margin-top:2px; }

/* ===== 分类标签 ===== */
.tabs {
  display:flex; gap:8px; overflow-x:auto; padding:14px 16px 10px;
  -webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:8px 18px; border-radius:20px;
  background:var(--card); color:var(--text-2); font-size:13px;
  border:1px solid var(--stroke); cursor:pointer;
  transition:all .2s var(--ease); white-space:nowrap; font-weight:500;
}
.tab:active { transform:scale(0.93); }
.tab.active {
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff; border-color:transparent; font-weight:600;
  box-shadow:0 2px 12px rgba(233,69,96,0.3);
}

/* ===== 卡片列表 ===== */
.list { padding:4px 16px 120px; }
.card {
 background:var(--card); border-radius:var(--radius); padding:26px 22px 22px 22px;
 margin-bottom:16px; cursor:pointer; transition:all .15s var(--ease);
 border:1px solid var(--stroke); position:relative;
 box-shadow:var(--shadow);
 animation:cardIn .18s var(--ease) both;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(20px) scale(0.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.card:active { transform:scale(0.97); background:var(--card-hover); }
.card-bar {
  position:absolute; left:0; top:20px; bottom:20px; width:4px;
  border-radius:2px;
}
.card-bar.cat-收藏 { background:var(--accent); }
.card-bar.cat-不熟练 { background:var(--amber); }
.card-bar.cat-完全不会 { background:var(--red); }
.card-bar.cat-掌握 { background:var(--green); }
.card-head {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px; padding-left:12px;
}
.card-tag {
  font-size:12px; font-weight:600; padding:4px 12px; border-radius:8px;
}
.card-tag.cat-收藏 { background:rgba(233,69,96,0.12); color:var(--accent); }
.card-tag.cat-不熟练 { background:rgba(251,191,36,0.12); color:var(--amber); }
.card-tag.cat-完全不会 { background:rgba(239,68,68,0.12); color:var(--red); }
.card-tag.cat-掌握 { background:rgba(74,222,128,0.12); color:var(--green); }
.card-src { font-size:11px; color:var(--text-3); }

/* 卡片预览：完整 stemHTML，含 KaTeX 公式渲染，不截断不溢出 */
.card-preview {
  padding-left:12px; font-size:15px; line-height:1.85; color:var(--text-2);
  word-break:break-word;
  opacity:0; transition:opacity .1s ease;
}
.card-preview.rendered { opacity:1; }
.card-preview p { margin-bottom:10px; }
.card-preview p:last-child { margin-bottom:0; }
.card-preview .katex-display {
 margin:10px 0; overflow-x:auto; overflow-y:hidden;
 -webkit-overflow-scrolling:touch;
}
.card-preview .katex-display > .katex {
 overflow-x:auto; overflow-y:hidden;
}
.card-preview .katex { font-size:1.02em; line-height:1.5; }
.preview-options{margin-top:8px;border-top:1px solid var(--stroke);padding-top:6px;}
.preview-option{display:flex;gap:8px;padding:4px 0;font-size:14px;color:var(--text-2);}
.preview-option .olabel{width:22px;height:22px;border-radius:6px;background:rgba(233,69,96,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
/* expand-btn removed - no longer needed */
/* 分类筛选按钮和抽屉 */
.filter-trigger{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 32px);margin:8px 16px;padding:10px 16px;border:1px solid var(--stroke);border-radius:12px;background:var(--card);color:var(--text-2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s var(--ease);}
.filter-trigger:active{transform:scale(.97);background:var(--card-hover);}
.filter-trigger .arrow-down{font-size:10px;color:var(--text-3);}
.filter-list{padding:4px 0 8px;}
.filter-item{display:flex;align-items:center;gap:10px;width:100%;padding:12px 4px;border:0;background:transparent;color:var(--text-2);font-size:14px;text-align:left;cursor:pointer;border-radius:10px;transition:all .1s var(--ease);}
.filter-item:active{background:var(--card-hover);}
.filter-item.active{color:var(--accent);font-weight:600;}
.filter-check{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;border:2px solid var(--stroke);font-size:13px;font-weight:700;flex-shrink:0;}
.filter-item.active .filter-check{border-color:var(--accent);background:var(--accent);color:#fff;}
/* 详情页导航按钮 */
.nav-buttons { display:flex; gap:10px; margin-top:16px; justify-content:center; }
.nav-buttons .fav-action { flex:1; max-width:160px; }

/* ===== 空状态 ===== */
.empty {
  text-align:center; padding:100px 32px; color:var(--text-3);
  animation:fadeIn .5s ease both;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.empty-emoji { font-size:56px; margin-bottom:16px; opacity:0.4; }
.empty-text { font-size:15px; line-height:1.8; color:var(--text-2); font-weight:500; }
.empty-sub { font-size:13px; color:var(--text-3); margin-top:4px; }

/* ===== 返回按钮 ===== */
.fab-back {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  padding:14px 44px; border-radius:26px; border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff; font-size:14px; font-weight:600; cursor:pointer; z-index:100;
  box-shadow:0 4px 24px rgba(233,69,96,0.35);
  transition:all .15s var(--ease);
  -webkit-user-select:none; user-select:none;
}
.fab-back:active { transform:translateX(-50%) scale(0.93); box-shadow:0 2px 12px rgba(233,69,96,0.25); }

/* ===== 详情页 ===== */
.detail-body { padding:12px 16px 120px; }
.detail-head {
  display:flex; align-items:center; gap:10px; margin-bottom:20px;
}
.detail-badge {
  font-size:12px; font-weight:600; padding:4px 12px; border-radius:8px;
}
.detail-badge.cat-收藏 { background:rgba(233,69,96,0.12); color:var(--accent); }
.detail-badge.cat-不熟练 { background:rgba(251,191,36,0.12); color:var(--amber); }
.detail-badge.cat-完全不会 { background:rgba(239,68,68,0.12); color:var(--red); }
.detail-badge.cat-掌握 { background:rgba(74,222,128,0.12); color:var(--green); }
.detail-meta { font-size:12px; color:var(--text-3); }

/* ===== 题目/答案/解析区块 ===== */
.block {
  background:var(--card); border-radius:var(--radius); padding:24px 20px;
  margin-bottom:14px; box-shadow:var(--shadow);
  border:1px solid var(--stroke);
}
.block-title {
  font-size:14px; font-weight:700; margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.block-title.stem { color:var(--accent); }
.block-title.answer { color:var(--green); }
.block-title.solution { color:var(--blue); }
.block-content { font-size:15px; line-height:1.85; color:var(--text-2); word-break:break-word; }
.block-content p { margin-bottom:10px; }
.block-content p:last-child { margin-bottom:0; }
.block-content ul { margin:8px 0 8px 4px; list-style:none; }
.block-content ul li { margin-bottom:6px; padding-left:8px; }
.block-content strong { color:var(--text); font-weight:600; }

/* 选项区域（不折叠，直接在题目下方） */
.block-options {
  margin-top:16px; padding-top:14px;
  border-top:1px solid var(--stroke);
  font-size:15px; line-height:1.85; color:var(--text-2);
}
.block-options p { margin-bottom:8px; }
.block-options p:last-child { margin-bottom:0; }
.block-options strong { color:var(--text); font-weight:600; }
.block-options .katex-display {
  margin:8px 0; overflow-x:auto; overflow-y:hidden; padding:4px 0;
}

/* ===== 展开按钮 ===== */
.toggle {
  width:100%; padding:16px; border-radius:14px; border:1px solid var(--stroke);
  background:var(--card); color:var(--text-2); font-size:14px; font-weight:600;
  cursor:pointer; margin-bottom:14px; transition:all .2s var(--ease);
  display:flex; align-items:center; justify-content:center; gap:8px;
  -webkit-user-select:none; user-select:none;
  position:relative; overflow:hidden;
}
.toggle:active { background:var(--card-hover); transform:scale(0.98); }
.toggle.open {
  color:var(--blue); border-color:rgba(79,195,247,0.25);
  background:rgba(79,195,247,0.06);
}
.toggle .arrow { font-size:12px; transition:transform .3s var(--ease); }
.toggle.open .arrow { transform:rotate(180deg); }

/* ===== 折叠区域：平滑展开 ===== */
.collapsible {
  max-height:0; overflow:hidden;
  transition:max-height .4s var(--ease), opacity .3s var(--ease), margin .4s var(--ease);
  opacity:0; margin-top:0;
}
.collapsible.open { max-height:5000px; opacity:1; margin-top:0; }
.collapsible .block {
  margin-top:0; margin-bottom:14px;
  animation:contentIn .35s var(--ease) both;
  animation-delay:.1s;
}
@keyframes contentIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}

/* ===== KaTeX 排版核心：不溢出、不挤压 ===== */
.block-content .katex-display {
 margin:14px 0; padding:8px 4px;
 overflow-x:auto; overflow-y:hidden;
 -webkit-overflow-scrolling:touch;
}
.block-content .katex {
 font-size:1.05em; line-height:1.5;
}
.block-content .katex-display > .katex {
 white-space:nowrap;
 overflow-x:auto; overflow-y:hidden;
}
/* 行内公式不溢出 */
.block-content .katex { overflow-wrap:break-word; }
/* 选项排版 */
.block-content p strong:first-child {
  display:inline-block; min-width:20px;
}

/* ===== 加载动画 ===== */
.loading {
  text-align:center; padding:100px 20px; color:var(--text-3);
}
.loading-spinner {
  width:32px; height:32px; border:3px solid var(--card);
  border-top-color:var(--accent); border-radius:50%;
  margin:0 auto 16px; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
/* 预渲染用透明度过渡 */
#app { transition: opacity .15s ease; }
.collapsible .block-content { transition: opacity .15s ease; }
/* ===== 交互按钮（收藏详情页） ===== */
.fav-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.fav-action{min-height:44px;border-radius:14px;border:1px solid var(--stroke);background:rgba(255,255,255,.035);color:var(--text-2);font-size:13px;font-weight:700;padding:8px;cursor:pointer;transition:all .15s ease}
.fav-action.on{background:rgba(233,69,96,.15);color:var(--accent);border-color:rgba(233,69,96,.3)}
.fav-action.primary{border:0;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2))}
.fav-action.wide{grid-column:span 2}
/* Toast */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(30,30,50,.96);border:1px solid var(--stroke);color:var(--text);border-radius:999px;padding:10px 18px;font-size:13px;z-index:200}
/* Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--surface);border-radius:var(--radius);padding:24px;width:90%;max-width:400px}
.modal-box h3{font-size:17px;margin-bottom:14px}
.modal-box textarea{width:100%;min-height:120px;border:1px solid var(--stroke);border-radius:12px;background:var(--bg);color:var(--text);padding:12px;font-size:14px;font-family:inherit}
.modal-box .char-count{text-align:right;font-size:12px;color:var(--text-3);margin:6px 0 12px}
.modal-box .save-btn{width:100%;padding:12px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-size:15px;font-weight:800;cursor:pointer}
/* ===== 下拉刷新 ===== */
.pull-refresh{position:absolute;left:0;right:0;top:-56px;height:56px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-3);font-size:13px;transition:transform .3s ease;z-index:10}
.pull-refresh .pr-spinner{width:20px;height:20px;border:2px solid var(--card);border-top-color:var(--accent);border-radius:50%;display:none}
.pull-refresh.pulling .pr-spinner{display:block;animation:spin .8s linear infinite}
.pull-refresh .pr-text{transition:color .2s ease}
.pull-refresh.can-release .pr-text{color:var(--accent);font-weight:600}

/* ===== 分类筛选抽屉（与 app_frontend.html 一致） ===== */
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.56);z-index:120;display:flex;align-items:flex-end;animation:fadeIn .2s ease both;}
.drawer{width:100%;max-height:72vh;background:var(--surface);border-radius:18px 18px 0 0;border:1px solid var(--stroke);box-shadow:0 -10px 40px rgba(0,0,0,.42);padding:18px 16px 24px;overflow:auto;animation:drawerIn .26s var(--ease) both;}
@keyframes drawerIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-handle{width:42px;height:4px;border-radius:99px;background:var(--text-3);opacity:.45;margin:0 auto 16px;}
.drawer-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.drawer-sub{font-size:12px;color:var(--text-3);margin-bottom:16px;}

/* Tablet: >=768px */
@media (min-width:768px){
.topbar{padding:14px 24px;gap:14px}
.topbar-title h1{font-size:20px}
.topbar-back,.topbar-home{width:44px;height:44px;font-size:20px;border-radius:14px}
.body{padding:20px 24px 100px;max-width:960px;margin:0 auto}
.list{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{padding:20px}
.tabs{padding:14px 24px 12px}
.modal-box{max-width:500px;padding:28px}
.modal-box textarea{min-height:160px;font-size:16px}
.detail-body{padding:20px 32px 120px;max-width:960px;margin:0 auto}
.block{padding:28px 24px}
.content{font-size:17px}
.fav-actions{grid-template-columns:repeat(3,1fr);max-width:700px;gap:12px}
.fav-action{min-height:50px;font-size:14px}
.nav-buttons{gap:16px}
.nav-buttons .fav-action{max-width:200px}
.detail-head{gap:14px;margin-bottom:24px}
.badge{font-size:14px;padding:6px 14px}
.meta{font-size:13px}
}
@media (min-width:1024px){
.body{max-width:1100px}
.list{grid-template-columns:repeat(3,1fr)}
.detail-body{max-width:900px}
}

/* Tablet: KaTeX larger, scroll smooth */
@media (min-width:768px){
.katex{font-size:1.15em}
.katex-display{margin:16px 0}
.body{overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-body{overflow-y:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="loading-spinner"></div><p>加载中…</p></div></div>
<script>
let FAVORITES_DATA = [];
let currentDetail = -1;
let isDetailView = false;
let savedListHTML = '';
let selectedPaths = []; // [] = all, otherwise array of selected category paths
let fv_nav = []; // navigation stack: [{view:'drawer'|'detail'}]
let fv_popReady = false;
let _popGuard = false; // guard against popstate triggered by our own history.back()
// 物理返回拦截：popstate 事件
window.addEventListener('popstate', function(e){
  if (!fv_popReady || _popGuard) { _popGuard = false; return; }
  if (fv_nav.length > 0) {
    var prev = fv_nav.pop();
    if (prev.view === 'drawer') {
      var el = document.getElementById('filterDrawer');
      if (el) el.remove();
    } else if (prev.view === 'detail') {
      goBackToList();
    }
  } else {
    bridgeBack();
  }
});
// 桥接返回
function bridgeBack() {
  if (window.Android && typeof window.Android.closeFavorites === 'function') {
    window.Android.closeFavorites();
  } else { window.history.back(); }
}
function bridgeHome() {
  if (window.Android && typeof window.Android.goHome === 'function') {
    window.Android.goHome();
  } else { window.location.href = 'file:///android_asset/app_frontend.html'; }
}

// KaTeX 渲染配置
const KATEX_OPTIONS = {
  delimiters: [
    {left:'$$',right:'$$',display:true},
    {left:'$',right:'$',display:false},
    {left:'\\[',right:'\\]',display:true},
    {left:'\\(',right:'\\)',display:false}
  ],
  throwOnError: false,
  errorColor: '#ef4444',
  strict: false
};

// UTF-8 安全的 base64 解码（标准 atob 只支持 Latin1，中文会乱码）
function b64DecodeUtf8(str) {
  var binary = atob(str);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return new TextDecoder('utf-8').decode(bytes);
}

function loadFromHash() {
  const hash = location.hash;
  if (hash.startsWith('#data=')) {
    try { FAVORITES_DATA = JSON.parse(b64DecodeUtf8(hash.substring(6))); }
    catch(e) { FAVORITES_DATA = []; }
    // 缓存到 localStorage（离线可用）
    try{localStorage.setItem('fav_cache',JSON.stringify(FAVORITES_DATA));}catch(e){}
  } else {
    // 尝试从 localStorage 加载缓存
    try{
      var cached = localStorage.getItem('fav_cache');
      if(cached) { FAVORITES_DATA = JSON.parse(cached); }
    }catch(e){}
  }
  renderList();
}
window.init = function(d) {
  try { FAVORITES_DATA = JSON.parse(d); } catch(e) { FAVORITES_DATA = []; }
  // 缓存到 localStorage
  try{localStorage.setItem('fav_cache',JSON.stringify(FAVORITES_DATA));}catch(e){}
  renderList();
};
loadFromHash();
// 初始化 popstate 监听
setTimeout(function(){ fv_popReady = true; history.replaceState({fv_view:'base'}, ''); },0);
// 进入时触发静默同步
if(window.Android&&window.Android.syncFavorites){setTimeout(function(){window.Android.syncFavorites();document.getElementById('syncStatus').textContent='同步中…';setTimeout(function(){document.getElementById('syncStatus').textContent=''},8000)},500)}

function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function catKey(c) {
  return { '收藏':'收藏','不熟练':'不熟练','完全不会':'完全不会','掌握':'掌握','all':'全部' }[c] || '收藏';
}
function catName(c) {
  return { all:'全部','收藏':'收藏','不熟练':'不熟练','完全不会':'完全不会','掌握':'已掌握' }[c] || c;
}
// 生成收藏页卡片预览 HTML：使用 CSS line-clamp:9 控制显示行数
function favCardPreview(q, idx) {
  var stem = q.stemHTML || q.stemPreview || '无题目内容';
  var opts = q.optionsHTML || '';
  var fullContent = stem + opts;
  return '<div class="card-preview" data-full="' + idx + '">' + fullContent + '</div>';
}
// 收藏页导航
function showPrev() {
  var filtered = getFilteredFavorites();
  var cur = FAVORITES_DATA[currentDetail];
  var fi = filtered.indexOf(cur);
  if (fi > 0) showDetail(FAVORITES_DATA.indexOf(filtered[fi - 1]));
}
function showNext() {
  var filtered = getFilteredFavorites();
  var cur = FAVORITES_DATA[currentDetail];
  var fi = filtered.indexOf(cur);
  if (fi < filtered.length - 1) showDetail(FAVORITES_DATA.indexOf(filtered[fi + 1]));
}
// 分类抽屉筛选
function getAllPaths() {
  var paths = {};
  FAVORITES_DATA.forEach(function(q){ if(q.categoryPath) paths[q.categoryPath]=true; });
  return Object.keys(paths).sort();
}
function getFilteredFavorites() {
  var all = FAVORITES_DATA;
  if (selectedPaths.length > 0) {
    all = all.filter(function(q){ return q.categoryPath && selectedPaths.indexOf(q.categoryPath) >= 0; });
  }
  return all;
}
function togglePath(path) {
  var idx = selectedPaths.indexOf(path);
  if (idx >= 0) selectedPaths.splice(idx, 1);
  else selectedPaths.push(path);
  refreshListView();
}
function selectAllPaths() {
  selectedPaths = [];
  refreshListView();
}
function filterLabel() {
  if (selectedPaths.length === 0) return '全部收藏';
  return '已选 ' + selectedPaths.length + ' 个分类';
}
function isPathSelected(path) {
  return selectedPaths.indexOf(path) >= 0;
}
function showFilterDrawer() {
  if (fv_nav.length > 0 && fv_nav[fv_nav.length-1].view === 'drawer') return; // already open
  fv_nav.push({view:'drawer'});
  history.pushState({fv_view:'drawer'}, '');
  renderFilterDrawer();
}
function renderFilterDrawer() {
  // 移除旧抽屉
  var old = document.getElementById('filterDrawer');
  if (old) old.remove();
  var paths = getAllPaths();
  var html = '<div class="drawer-mask" onclick="if(event.target===this)closeFilterDrawer()"><div class="drawer">'
    + '<div class="drawer-handle"></div>'
    + '<div class="drawer-title">题目分类</div>'
    + '<div class="drawer-sub">可多选，点选即生效</div>'
    + '<div class="filter-list">'
    + '<button class="filter-item' + (selectedPaths.length===0?' active':'') + '" data-path="__all__"><span class="filter-check">' + (selectedPaths.length===0?'✓':'') + '</span>全部收藏</button>';
  paths.forEach(function(p){
    var sel = isPathSelected(p);
    html += '<button class="filter-item' + (sel?' active':'') + '" data-path="' + p.replace(/&/g,'&amp;').replace(/"/g,'"') + '"><span class="filter-check">' + (sel?'✓':'') + '</span>' + esc(p) + '</button>';
  });
  html += '</div></div></div>';
  var div = document.createElement('div');
  div.id = 'filterDrawer';
  div.innerHTML = html;
  // 点击事件委托
  div.addEventListener('click', function(e){
    var item = e.target.closest('.filter-item');
    if (!item) return;
    var path = item.dataset.path;
    if (path === '__all__') { selectAllPaths(); closeFilterDrawer(); }
    else {
      togglePath(path);
      // 重新渲染抽屉内的按钮状态（✓ + active 类），保持打开
      renderFilterDrawer();
    }
  });
  document.body.appendChild(div);
}
function closeFilterDrawer() {
  var el = document.getElementById('filterDrawer');
  if (!el) return;
  el.remove();
  // 清理 nav 栈
  while (fv_nav.length > 0 && fv_nav[fv_nav.length-1].view === 'drawer') {
    fv_nav.pop();
  }
  // 同步移除 history 状态，用 _popGuard 防止 popstate 误触发
  _popGuard = true;
  history.back();
}
function renderMath(container) {
  try {
    renderMathInElement(container, KATEX_OPTIONS);
  } catch(e) {}
}

  isDetailView = false;
  const app = document.getElementById('app');
  const filtered = getFilteredFavorites();
  const paths = getAllPaths();

  let cardsHtml = '';

    cardsHtml = '<div class="empty"><div class="empty-emoji">📭</div><div class="empty-text">暂无收藏题目</div><div class="empty-sub">收藏后会显示在这里</div></div>';
  } else {
    cardsHtml = filtered.map((q, i) => {
      const idx = FAVORITES_DATA.indexOf(q);

        + '<div class="card-bar cat-' + ck + '"></div>'

        +   '<span class="card-src">' + esc(q.source) + ' · #' + (q.questionNumber||'') + '</span>'
        + '</div>'
        + favCardPreview(q, idx)

    }).join('');

  app.innerHTML = '<div class="page" id="favPage">'

    +   '<button class="topbar-back" onclick="bridgeBack()">←</button>'
    +   '<div class="topbar-title"><h1>收藏题目</h1>'
    +   '<div class="sub">共 ' + FAVORITES_DATA.length + ' 题 · <span id="syncStatus">已缓存到本地</span></div></div>'
    +   '<button class="topbar-home" onclick="bridgeHome()">⌂</button>'
    + '</div>'
    + '<div style="position:relative;overflow:hidden">'
    +   '<div class="pull-refresh" id="pullRefresh"><span class="pr-spinner"></span><span class="pr-text" id="prText">↓ 下拉刷新</span></div>'
    +   '<button class="filter-trigger" onclick="showFilterDrawer()">' + esc(filterLabel()) + ' <span class="arrow-down">▼</span></button>'
    +   '<div class="list">' + cardsHtml + '</div>'
    + '</div>'
    + '<button class="fab-back" onclick="bridgeBack()">返回</button>'
    + '</div>';

  if (filtered.length > 0) {
    setTimeout(function(){
      var cards = app.querySelectorAll('.card-preview');
      for(var ci=0;ci<cards.length;ci++){
        try{renderMathInElement(cards[ci],KATEX_OPTIONS);}catch(e){}

var ck = catKey(q.category);
return '<div class="card" style="--i:' + i + '" onclick="showDetail(' + idx + ')">'

function goBackToList() {
  // 从详情返回列表
  if (savedListHTML) {
    document.getElementById('app').innerHTML = savedListHTML;
    savedListHTML = '';
    isDetailView = false;
    currentDetail = -1;
  } else {
    renderList();
  }
  // 移除 detail 状态
  if (fv_nav.length > 0 && fv_nav[fv_nav.length-1].view === 'detail') {
    fv_nav.pop();
    _popGuard = true;
    history.back();
  }
}

function showDetail(idx) {
  var q = FAVORITES_DATA[idx]; if (!q) return;
  currentDetail = idx; isDetailView = true;
  var app = document.getElementById('app');
  savedListHTML = app.innerHTML;
  var ck = catKey(q.category);

  // Push detail state
  if (fv_nav.length === 0 || fv_nav[fv_nav.length-1].view !== 'detail') {
    fv_nav.push({view:'detail', idx: idx});
    history.pushState({fv_view:'detail'}, '');
  }

  // 选项 HTML：如果有选项，放在题目 block 内部（不折叠）
  var optionsInBlock = '';
  if (q.optionsHTML) {
    optionsInBlock = '<div class="block-options">' + q.optionsHTML + '</div>';
  }

  // 正确答案（折叠）
  var answerHtml = '';
  if (q.answerHTML) {
    answerHtml = '<button class="toggle" onclick="toggleBlock(this)">'
      + '<span class="toggle-label">📖 查看答案</span><span class="arrow">▼</span>'
      + '</button>'
      + '<div class="collapsible"><div class="block">'
      +   '<div class="block-title answer">✅ 答案</div>'
      +   '<div class="block-content">' + q.answerHTML + '</div>'
      + '</div></div>';
  }

  // 解析（折叠）
  var solutionHtml = '';
  if (q.solutionHTML) {
    solutionHtml = '<button class="toggle" onclick="toggleBlock(this)">'
      + '<span class="toggle-label">💡 查看解析</span><span class="arrow">▼</span>'
      + '</button>'
      + '<div class="collapsible"><div class="block">'
      +   '<div class="block-title solution">📋 解析</div>'
      +   '<div class="block-content">' + q.solutionHTML + '</div>'
      + '</div></div>';
  }

  app.innerHTML = '<div class="page">'
    + '<div class="topbar">'
    +   '<button class="topbar-back" onclick="goBackToList()">←</button>'
    +   '<div class="topbar-title"><h1>' + esc(q.source) + '</h1>'
    +   '<div class="sub">题目 #' + (q.questionNumber||idx+1) + ' · ' + catName(q.category) + '</div></div>'
    +   '<button class="topbar-home" onclick="bridgeHome()">⌂</button>'
    + '</div>'
    + '<div class="detail-body">'
    +   '<div class="detail-head">'
    +     '<span class="detail-badge cat-' + ck + '">' + catName(q.category) + '</span>'
    +     '<span class="detail-meta">' + esc(q.source) + '</span>'
    +   '</div>'
    +   '<div class="block">'
    +     '<div class="block-title stem">📝 题目</div>'
    +     '<div class="block-content">' + (q.stemHTML || '<p>无题目内容</p>') + '</div>'
    +     optionsInBlock
    +   '</div>'
    +   answerHtml
    +   solutionHtml
    +   favActionsHtml(q)
    +   (function(){
      var filtered = getFilteredFavorites();
      var fi = filtered.indexOf(q);
      var prevBtn = fi > 0 ? '<button class="fav-action" onclick="showPrev()">← 上一题</button>' : '';
      var nextBtn = fi < filtered.length - 1 ? '<button class="fav-action" onclick="showNext()">下一题 →</button>' : '';
      return '<div class="nav-buttons">' + prevBtn + nextBtn + '</div>';
    })()
    + '<button class="fab-back" onclick="goBackToList()">返回列表</button>'
    + '</div>'
    + '</div>';

  // 渲染题目区域的 KaTeX
  setTimeout(function(){
    var blocks = app.querySelectorAll('.block-content, .block-options');
    for(var bi=0;bi<blocks.length;bi++){
      try{renderMathInElement(blocks[bi],KATEX_OPTIONS);}catch(e){}
    }
  }, 50);
  setTimeout(ub, 120);
  // 如果答案或解析为空，尝试从 API 单独拉取题目详情
  if ((!q.answerHTML || q.answerHTML.indexOf('<p></p>')>=0) && (!q.solutionHTML || q.solutionHTML.length<5) && q.id && navigator.onLine) {
    var tk = '';
    try{tk=localStorage.getItem('daguan_token')||''}catch(e){}
    if(tk){
      fetch('/api/questions/'+q.id,{headers:{'Authorization':'Bearer '+tk}})
        .then(function(r){return r.json()})
        .then(function(qd){
          if(!qd||!qd.id)return;
          // 更新当前题目的 answerHTML 和 solutionHTML
          var ans = qd.answer || {};
          var refAns = ans.reference_answer_md || qd.correct_answer || '';
          if(refAns){q.answerHTML='<p>'+refAns+'</p>';FAVORITES_DATA[idx]=q;try{localStorage.setItem('fav_cache',JSON.stringify(FAVORITES_DATA));}catch(e){}}
          var expl = qd.answer_explanation || (qd.document?qd.document.explanation_md:'') || '';
          if(expl){q.solutionHTML=expl;FAVORITES_DATA[idx]=q;try{localStorage.setItem('fav_cache',JSON.stringify(FAVORITES_DATA));}catch(e){}}
          if(refAns||expl)showDetail(idx);
        })
        .catch(function(){});
    }
  }
}

window.updateFavoritesData = function(b64){
  try{
    var data = JSON.parse(b64DecodeUtf8(b64));
    if(Array.isArray(data) && data.length >= 0){
      if(JSON.stringify(data)===JSON.stringify(FAVORITES_DATA)) return;
      // 保留本地已有笔记
      var oldNotes = {};
      FAVORITES_DATA.forEach(function(o){if(o.id&&o.note)oldNotes[o.id]=o.note});
      data.forEach(function(item){if(item.id&&oldNotes[item.id])item.note=oldNotes[item.id]});
      FAVORITES_DATA = data;
      // 同步后更新 localStorage 缓存
      try{localStorage.setItem('fav_cache',JSON.stringify(data));}catch(e){}
      updateListInPlace(data);
      // 如果在详情页，根据当前题目 id 重新渲染详情（确保答案/解析最新）
      if(isDetailView && currentDetail >= 0 && currentDetail < FAVORITES_DATA.length){
        var oldId = FAVORITES_DATA[currentDetail] ? FAVORITES_DATA[currentDetail].id : null;
        if(oldId){
          // 找更新后的数据中同 id 的题目
          for(var di=0; di<FAVORITES_DATA.length; di++){
            if(FAVORITES_DATA[di].id === oldId){
              showDetail(di);
              break;
            }
          }
        }
      }
    }
  }catch(e){}
};
function updateListInPlace(data){
  var app = document.getElementById('app');
  // 更新顶部统计数字
  var subEl = app.querySelector('.topbar .sub');
  if(subEl) subEl.innerHTML = '共 ' + data.length + ' 题 · <span id="syncStatus">已同步</span>';
  // 直接刷新当前列表视图（保留 topbar 和页面结构）
  refreshListView();
}
function toggleBlock(btn) {
  var wrap = btn.nextElementSibling;
  if (!wrap) return;
  var isOpen = wrap.classList.contains('open');
  var label = btn.querySelector('.toggle-label');
  var isAnswer = label.textContent.indexOf('答案') >= 0;

  if (isOpen) {
    // 收起
    wrap.style.maxHeight = wrap.scrollHeight + 'px';
    // 强制 reflow
    wrap.offsetHeight;
    wrap.style.maxHeight = '0';
    wrap.classList.remove('open');
    btn.classList.remove('open');
    label.textContent = isAnswer ? '📖 查看答案' : '💡 查看解析';
  } else {
    // 展开
    wrap.classList.add('open');
    btn.classList.add('open');
    label.textContent = isAnswer ? '✅ 收起答案' : '📋 收起解析';
    // 先设为 auto 计算高度，再设回去实现动画
    requestAnimationFrame(function(){
      var targetHeight = wrap.scrollHeight;
      wrap.style.maxHeight = targetHeight + 'px';
      // 先隐藏避免公式闪白
      var content = wrap.querySelector('.block-content');
      if (content) {
        content.style.opacity = '0';
        renderMath(content);
        setTimeout(function(){ content.style.opacity = '1'; }, 100);
      }
      // 动画结束后移除固定高度，允许自适应
      setTimeout(function(){
        wrap.style.maxHeight = 'none';
      }, 450);
    });
  }
}

function goBack() {
  // 从详情返回列表，同时处理 nav 栈
  if (isDetailView) {
    isDetailView = false;
    if (savedListHTML) {
      document.getElementById('app').innerHTML = savedListHTML;
      refreshListView();
    } else {
      renderList();
    }
    // 从 nav 栈弹出 detail
    if (fv_nav.length > 0 && fv_nav[fv_nav.length-1].view === 'detail') {
      fv_nav.pop();
    }
  }
  else if (fv_nav.length > 0) {
    // 有栈项：回到上一个状态
    var prev = fv_nav.pop();
    if (prev.view === 'drawer') closeFilterDrawer();
    else if (prev.view === 'detail') goBackToList();
  }
  else { bridgeBack(); }
}
// ===== 收藏详情交互按钮 =====
function toast(m){var old=document.querySelector('.toast');if(old)old.remove();var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},1200)}
function bridge(n,a){try{if(window.Android&&typeof window.Android[n]=='function'){if(a===void 0)window.Android[n]();else window.Android[n](String(a));return true}}catch(e){}return false}
function cq(){return FAVORITES_DATA[currentDetail]||{}}
function qi(q){return q.id||q.question_id||''}
function isFav(q){return!!(q.rawFavoritedAt)}
function mast(q){return q.rawMastery||''}
function gNote(q){return q.note||''}
function hasNote(q){return!!gNote(q)}
// 更新交互按钮状态（根据当前题目数据刷新 DOM）
function ub(){
  var q=cq();if(!q)return;
  document.querySelectorAll('.fav-action').forEach(function(b){
    var a=b.getAttribute('data-a');if(!a)return;
    if(a=='fav'){b.classList.toggle('on',isFav(q));b.textContent=isFav(q)?'✓已收藏':'☆收藏'}
    else if(a=='mastered'||a=='familiar'||a=='unknown'){
      var m=mast(q);
      var matched=(a=='mastered'&&m=='mastered')||(a=='familiar'&&m=='needs_practice')||(a=='unknown'&&m=='not_known');
      b.classList.toggle('on',matched);
      var t=a=='mastered'?'掌握':a=='familiar'?'不熟练':'不会';
      b.textContent=(matched?'✓ ':'')+t}
    b.disabled=false; // 恢复可用
  });
  var nb=document.getElementById('favNoteBtn');if(nb)nb.textContent=hasNote(q)?'✏编辑笔记':'➕添加笔记'
}
// Java 异步回调：action 完成后调用此函数刷新按钮状态
window.onPracticeActionComplete = function(){ ub(); };
function act(a){
  var q=cq(),id=qi(q);
  if(!id||!q)return;
  if(!navigator.onLine){toast('网络异常');return}
  // 禁用按钮防重复点击
  document.querySelectorAll('.fav-action').forEach(function(b){b.disabled=true});
  if(a=='fav'){
    if(isFav(q)){q.rawFavoritedAt='';var idx=FAVORITES_DATA.indexOf(q);if(idx>=0)FAVORITES_DATA.splice(idx,1);bridge('practiceAction','fav_false|'+id);toast('已取消收藏');goBack();return}
    else{toast('请先在练习页收藏');ub();return}
  }else{
    var m=mast(q);
    var already=(a=='mastered'&&m=='mastered')||(a=='familiar'&&m=='needs_practice')||(a=='unknown'&&m=='not_known');
    if(already){
      q.rawMastery='not_started';
      bridge('practiceAction','not_started|'+id);
      toast('已取消'+(a=='mastered'?'掌握':a=='familiar'?'不熟练':'不会'))
    }else{
      var apiAction=a;
      if(a=='familiar'){q.rawMastery='needs_practice';apiAction='needs_practice'}
      else if(a=='unknown'){q.rawMastery='not_known';apiAction='not_known'}
      else if(a=='mastered'){q.rawMastery='mastered';apiAction='mastered'}
      toast('已标记'+(a=='mastered'?'掌握':a=='familiar'?'不熟练':'不会'));
      bridge('practiceAction',apiAction+'|'+id)
    }
  }
  setTimeout(function(){ub()},200) // 乐观更新（Java 回调会再次刷新）
}
function openNote(){
 var q=cq(),id=qi(q);
 if(!id||!q)return;
 if(!navigator.onLine){toast('网络异常');return}
 var existing=gNote(q);
 var d=document.createElement('div');d.className='modal';
 var bx=document.createElement('div');bx.className='modal-box';
 bx.innerHTML='<h3>'+(existing?'编辑笔记':'添加笔记')+'</h3><textarea id="noteTextarea" maxlength="2000">'+esc(existing)+'</textarea><div class="char-count"><span id="noteCount">'+existing.length+'</span>/2000</div><button class="save-btn" id="noteSave">保存笔记</button><button class="fav-action wide" id="noteCancel" style="margin:8px 0 0">取消</button>';d.appendChild(bx);document.body.appendChild(d);
 var ta=bx.querySelector('#noteTextarea');ta.focus();ta.selectionStart=ta.value.length;
 ta.addEventListener('input',function(){document.getElementById('noteCount').textContent=ta.value.length});
 bx.querySelector('#noteSave').addEventListener('click',function(){var txt=ta.value;q.note=txt;d.remove();ub();toast('笔记已保存');bridge('practiceAction','note|'+id+'|'+encodeURIComponent(txt));try{var fc=JSON.parse(localStorage.getItem('fav_cache')||'[]');for(var fi=0;fi<fc.length;fi++){if(fc[fi].id==id){fc[fi].note=txt;break}}localStorage.setItem('fav_cache',JSON.stringify(fc))}catch(e){}});
 bx.querySelector('#noteCancel').addEventListener('click',function(){d.remove()})
}
function favActionsHtml(q){
 return '<div class="fav-actions">'
 + '<button class="fav-action primary" data-a="fav" onclick="act(\'fav\')">'+(isFav(q)?'✓已收藏':'☆收藏')+'</button>'
 + '<button class="fav-action" data-a="mastered" onclick="act(\'mastered\')">掌握</button>'
 + '<button class="fav-action" data-a="familiar" onclick="act(\'familiar\')">不熟练</button>'
 + '<button class="fav-action" data-a="unknown" onclick="act(\'unknown\')">不会</button>'

 + '</div>';
}
// ===== 下拉刷新：仅限列表页 =====
var pullState = {startY:0, pulling:false, moved:false};
var PULL_THRESHOLD = 60; // px
function initPullRefresh(){
 var listEl = document.querySelector('.list');
 if(!listEl) return;
 listEl.addEventListener('touchstart', function(e){
   if(isDetailView || listEl.scrollTop > 0) return;
   pullState.startY = e.touches[0].pageY;
   pullState.pulling = false;
   pullState.moved = false;
 }, {passive:true});
 listEl.addEventListener('touchmove', function(e){
   if(isDetailView || pullState.startY === 0) return;
   var dy = e.touches[0].pageY - pullState.startY;
   if(dy <= 0) return;
   if(listEl.scrollTop > 0) return;
   e.preventDefault();
   pullState.moved = true;
   var pr = document.getElementById('pullRefresh');
   if(!pr) return;
   if(dy >= PULL_THRESHOLD){
     pr.classList.add('can-release');
     document.getElementById('prText').textContent = '释放刷新';
   }else{
     pr.classList.remove('can-release');
     document.getElementById('prText').textContent = '↓ 下拉刷新';
   }
   // 跟随手指位移
   var offset = Math.min(dy * 0.4, 40);
   pr.style.transform = 'translateY(' + (56 + offset) + 'px)';
 }, {passive:false});
 listEl.addEventListener('touchend', function(e){
   if(!pullState.moved || isDetailView) return;
   var pr = document.getElementById('pullRefresh');
   if(pr){
     pr.style.transform = '';
     pr.classList.remove('can-release');
   }
   var dy = e.changedTouches[0].pageY - pullState.startY;
   if(dy >= PULL_THRESHOLD && window.Android && window.Android.syncFavorites){
     // 触发刷新
     document.getElementById('prText').textContent = '刷新中…';
     pr.classList.add('pulling');
     document.getElementById('syncStatus').textContent = '同步中…';
     window.Android.syncFavorites();
     setTimeout(function(){
       pr.classList.remove('pulling');
       document.getElementById('prText').textContent = '↓ 下拉刷新';
     }, 5000);
   }
   pullState.startY = 0;
   pullState.pulling = false;
   pullState.moved = false;
 }, {passive:true});
}
// 初始化和每次列表渲染后重新绑定
setTimeout(initPullRefresh, 400);
// 覆盖 renderList 和 refreshListView 以在渲染后重新绑定
var origRenderList = renderList;
renderList = function(){
  origRenderList.apply(this, arguments);
  setTimeout(initPullRefresh, 250);
};
var origRefreshListView = refreshListView;
refreshListView = function(){
  origRefreshListView.apply(this, arguments);
  setTimeout(initPullRefresh, 150);
};
</script>
</body>
